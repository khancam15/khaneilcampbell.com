<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Khaneil Campbell's CompTIA Security+ Certification" />
  <meta name="theme-color" content="#020617" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self'; font-src 'self'; base-uri 'self'; form-action 'none';" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Security+ Certification | Khaneil Campbell</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, rgba(59,130,246,0.18), transparent 30%),
                  radial-gradient(circle at 80% 20%, rgba(16,185,129,0.12), transparent 22%),
                  linear-gradient(to bottom, #020617, #020617);
      color: white;
      line-height: 1.6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      width: 90%;
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      border-bottom: 1px solid rgba(255,255,255,0.1);
      background: rgba(2, 6, 23, 0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
    }

    .brand small {
      display: block;
      color: #67e8f9;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      font-size: 12px;
    }

    .brand span {
      color: #cbd5e1;
      font-size: 14px;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 24px;
    }

    nav ul li a {
      color: #cbd5e1;
      font-size: 14px;
    }

    nav ul li a:hover {
      color: white;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 14px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .btn-outline {
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: white;
    }

    .btn-outline:hover {
      background: rgba(255,255,255,0.1);
    }

    main {
      padding: 80px 0;
    }

    .cert-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    .cert-header {
      text-align: center;
    }

    .section-label {
      color: #67e8f9;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      font-size: 12px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .cert-description {
      color: #cbd5e1;
      font-size: 18px;
      max-width: 700px;
      margin-bottom: 24px;
    }

    .cert-details {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      max-width: 600px;
    }

    .detail-box {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }

    .detail-label {
      color: #94a3b8;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .detail-value {
      color: #e2e8f0;
      font-size: 16px;
      font-weight: 500;
    }

    .cert-image-wrapper {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 24px;
      max-width: 900px;
      width: 100%;
    }

    .cert-image-wrapper img {
      width: 100%;
      height: auto;
      border-radius: 16px;
      display: block;
    }

    .cert-fallback {
      color: #94a3b8;
      font-size: 14px;
      margin-top: 14px;
      text-align: center;
    }

    .cert-fallback a {
      color: #22d3ee;
    }

    .cert-fallback a:hover {
      color: #67e8f9;
    }

    .cert-footer {
      text-align: center;
      margin-top: 40px;
      padding-top: 40px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .cert-verification {
      color: #cbd5e1;
      margin-bottom: 24px;
    }

    .cert-verification a {
      color: #22d3ee;
    }

    .cert-verification a:hover {
      color: #67e8f9;
    }

    @media (max-width: 900px) {
      h1 {
        font-size: 32px;
      }

      .cert-details {
        grid-template-columns: 1fr;
      }

      nav ul {
        display: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav">
      <div class="brand">
        <small>Khaneil Campbell</small>
        <span>Cybersecurity Portfolio</span>
      </div>

      <nav>
        <ul>
          <li><a href="index.html#home">Home</a></li>
          <li><a href="index.html#labs">Labs</a></li>
          <li><a href="index.html#about">About</a></li>
          <li><a href="index.html#contact">Contact</a></li>
        </ul>
      </nav>

      <a href="index.html" class="btn btn-outline">Back to Portfolio</a>
    </div>
  </header>

  <main class="container">
    <div class="cert-container">
      <div class="cert-header">
        <p class="section-label">Professional Credential</p>
        <h1>CompTIA Security+</h1>
        <div class="cert-details">
          <div class="detail-box">
            <div class="detail-label">Certification Date</div>
            <div class="detail-value">May 12, 2025</div>
          </div>
          <div class="detail-box">
            <div class="detail-label">Candidate ID</div>
            <div class="detail-value">COMP001022470377</div>
          </div>
        </div>
      </div>

      <div class="cert-image-wrapper">
        <img src="images/security-plus-cert.png" alt="CompTIA Security+ Certification" />
      </div>

      <div class="cert-footer">
        <a href="index.html" class="btn btn-outline">Return to Portfolio</a>
      </div>
    </div>
  </main>
</body>
</html>
